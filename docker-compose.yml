# docker-compose.yml — Nornikel Knowledge Graph (full stack)
#
# Запускает:
#   - neo4j       — графовая БД
#   - ingestion   — one-shot задача: парсинг + NER/RE + загрузка (см. profiles)
#   - api         — FastAPI сервер для запросов
#
# Базовый запуск (только Neo4j + API):
#   docker compose up -d neo4j api
#
# С ingestion (pipeline по уже распарсенным Markdown-файлам):
#   docker compose --profile ingest up ingestion
#
# Подключение своего RAG-бэкенда:
#   см. agent/rag_factory.py — зарегистрируй entry-point или
#   установи RAG-пакет в свой образ API.
#
# Переменные окружения читаются из .env (если есть) и шелла.

x-common-env: &common-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-knowledge}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-text}
  YANDEX_GPT_API_KEY: ${YANDEX_GPT_API_KEY:-}
  YANDEX_GPT_FOLDER_ID: ${YANDEX_GPT_FOLDER_ID:-}
  YANDEX_GPT_MODEL_URI: ${YANDEX_GPT_MODEL_URI:-yandexgpt-lite}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash/latest}
  YANDEX_OPENAI_BASE_URL: ${YANDEX_OPENAI_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
  YANDEX_REASONING_MODE: ${YANDEX_REASONING_MODE:-}
  YANDEX_REASONING_EFFORT: ${YANDEX_REASONING_EFFORT:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-poolside/laguna-xs-2.1:free}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Nornikel-AI-Science-Hack}
  LLM_CLIENT_MODE: ${LLM_CLIENT_MODE:-mock}
  API_KEY: ${API_KEY:-}
  RAG_BACKEND: ${RAG_BACKEND:-hybrid_search}
  RAG_DATA_JSON: ${RAG_DATA_JSON:-/app/frontend/data.json}

services:
  neo4j:
    image: neo4j:5
    container_name: nornikel-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP-браузер (http://localhost:7474)
      - "7687:7687"   # Bolt (для python-драйвера)
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-knowledge}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "1g"
      NEO4J_server_memory_heap_max__size: "2g"
      NEO4J_server_memory_pagecache_size: "1g"
      NEO4J_server_default__listen__address: "0.0.0.0"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-knowledge}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nornikel-api
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      <<: *common-env
    command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "1"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nornikel-ingestion
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      <<: *common-env
      INGEST_INPUT_DIR: ${INGEST_INPUT_DIR:-/data/Статьи}
      INGEST_OUTPUT_DIR: ${INGEST_OUTPUT_DIR:-/data/parsed_chunks}
    volumes:
      - ./Статьи:/data/Статьи:ro
      - ./Доклады:/data/Доклады:ro
      - ./parsed_chunks:/data/parsed_chunks:rw
    profiles: ["ingest"]
    command: >
      sh -c "python -m scripts.ingest
             --input $${INGEST_INPUT_DIR}
             --output $${INGEST_OUTPUT_DIR}
             --neo4j-uri bolt://neo4j:7687
             --neo4j-user neo4j
             --neo4j-password $${NEO4J_PASSWORD:-knowledge}"

volumes:
  neo4j_data:
  neo4j_logs:
